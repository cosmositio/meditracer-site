<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meditracer</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #081226, #0f172a);
      color: white;
      text-align: center;
      padding: 40px 20px;
    }

    .logo {
      width: 110px;
      border-radius: 24px;
      margin-top: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 42px;
      margin: 20px 0 10px;
    }

    p {
      color: #cbd5f5;
      font-size: 18px;
    }

    .dev {
      margin-top: 10px;
      font-size: 16px;
      color: #9fb3d9;
    }

    .card {
      margin-top: 40px;
      background: rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 25px;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }

    .features span {
      display: inline-block;
      background: rgba(255,255,255,0.08);
      padding: 10px 16px;
      border-radius: 20px;
      margin: 6px;
      font-size: 14px;
    }

    .screenshot {
      width: 280px;
      margin-top: 25px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .btn {
      display: inline-block;
      margin-top: 30px;
      padding: 14px 24px;
      background: #22c55e;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: bold;
    }

    .privacy {
      margin-top: 15px;
      display: block;
      color: #94a3b8;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <!-- LOGO -->
  <img src="logo.png" class="logo">

  <!-- TITLE -->
  <h1>Meditracer</h1>

  <!-- DESCRIPTION -->
  <p>Track your medications easily and never miss a dose.</p>

  <!-- DEVELOPER -->
  <div class="dev">Developer: Volkan Pekatik</div>

  <!-- CARD -->
  <div class="card">
    <h2>App Overview</h2>

    <div class="features">
      <span>Medication reminders</span>
      <span>Daily dose tracking</span>
      <span>Simple interface</span>
      <span>Schedule management</span>
    </div>

    <!-- SCREENSHOT -->
    <img src="app.jpeg" class="screenshot">
  </div>

  <!-- BUTTON -->
  <a href="javascript:void(0)" class="btn">📱 Coming Soon on Google Play</a>

  <!-- PRIVACY -->
  <a href="privacy.html" class="privacy">Privacy Policy</a>

</body>
</html>
