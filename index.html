<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meditracer</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #081226 0%, #0f172a 100%);
      color: white;
      text-align: center;
      padding: 40px 20px 60px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .logo {
      width: 110px;
      height: 110px;
      border-radius: 24px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0;
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -1px;
    }

    .subtitle {
      margin: 18px auto 10px;
      font-size: 24px;
      line-height: 1.5;
      color: #d7e3ff;
      max-width: 700px;
    }

    .developer {
      margin-top: 10px;
      font-size: 18px;
      color: #b8c7e6;
    }

    .card {
      margin: 40px auto 0;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 30px 20px;
      max-width: 800px;
      backdrop-filter: blur(4px);
    }

    .features-title {
      margin-top: 0;
      margin-bottom: 20px;
      font-size: 26px;
      color: white;
    }

    .features {
      list-style: none;
      padding: 0;
      margin: 0 0 30px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
    }

    .features li {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      padding: 12px 18px;
      color: #dce7ff;
      font-size: 16px;
    }

    .screenshot {
      width: 100%;
      max-width: 320px;
      border-radius: 24px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
      border: 4px solid rgba(255, 255, 255, 0.08);
    }

    .footer {
      margin-top: 40px;
      font-size: 14px;
      color: #95a8cf;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 36px;
      }

      .subtitle {
        font-size: 20px;
      }

      .developer {
        font-size: 16px;
      }

      .card {
        padding: 24px 16px;
      }

      .features li {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="logo.png" alt="Meditracer Logo" class="logo" />

    <h1>Meditracer</h1>
    <p class="subtitle">Track your medications easily and never miss a dose.</p>
    <p class="developer">Developer: Volkan Pekatik</p>

    <div class="card">
      <h2 class="features-title">App Overview</h2>

      <ul class="features">
        <li>Medication reminders</li>
        <li>Daily dose tracking</li>
        <li>Simple interface</li>
        <li>Schedule management</li>
      </ul>

      <img src="app.jpeg" alt="Meditracer App Screenshot" class="screenshot" />
    </div>

    <p class="footer">Meditracer medication tracking application</p>
  </div>
</body>
</html>
